openapi: 3.0.0
info:
  title: Xpand
  version: 0.0.0
tags:
  - name: Users
  - name: Offers
  - name: References
paths:
  /api/v1/offer_letters:
    get:
      tags:
        - Offers
      operationId: Offers_list
      summary: Fetch & search offer letters. Pass the query in 'filters' parameters using ids, offer_ids, user_ids and statuses.
      parameters:
        - name: filters
          in: query
          required: false
          schema:
            type: object
            properties:
              ids:
                type: array
                items:
                  $ref: '#/components/schemas/uuid'
                description: Comma separated list of Xpand Offer IDs
              offer_ids:
                type: array
                items:
                  $ref: '#/components/schemas/uuid'
                description: Comma separated list of Client Offer IDs
              user_ids:
                type: array
                items:
                  $ref: '#/components/schemas/uuid'
                description: Comma separated list of Xpand User IDs
              statuses:
                type: array
                items:
                  type: string
                  enum:
                    - pending_initiation
                    - pending_approval
                    - admin_approved
                    - admin_rejected
                    - candidate_pending
                    - candidate_accepted
                    - candidate_declined
                    - rescinded
                    - voided
                description: Comma separated list of Offer Statuses
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/OfferLetterResponseFull'
                required:
                  - data
    post:
      tags:
        - Offers
      operationId: Offers_create
      summary: Create or update an offer letter
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/OfferLetterResponseSimple'
                required:
                  - data
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  properties:
                    attributes:
                      $ref: '#/components/schemas/OfferLetterRequest'
                  required:
                    - attributes
              required:
                - data
  /api/v1/offer_letters/{id}:
    delete:
      tags:
        - Offers
      operationId: Offers_delete
      summary: Rescind an offer letter
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/uuid'
      responses:
        '204':
          description: 'There is no content to send for this request, but the headers may be useful. '
  /api/v1/references:
    post:
      tags:
        - References
      operationId: References_create
      parameters: []
      responses:
        '204':
          description: 'There is no content to send for this request, but the headers may be useful. '
  /api/v1/references/job_profiles:
    get:
      tags:
        - References
      operationId: References_job_profiles
      parameters: []
      responses:
        '204':
          description: 'There is no content to send for this request, but the headers may be useful. '
  /api/v1/references/office_locations:
    get:
      tags:
        - References
      operationId: References_office_locations
      parameters: []
      responses:
        '204':
          description: 'There is no content to send for this request, but the headers may be useful. '
  /api/v1/users:
    get:
      tags:
        - Users
      operationId: Users_list
      summary: Fetch & search users Pass the query in 'filters' parameters using ids and emails.
      parameters:
        - name: filter
          in: query
          required: false
          schema:
            type: object
            properties:
              ids:
                type: array
                items:
                  $ref: '#/components/schemas/uuid'
                description: Comma separated list of Xpand User IDs
              emails:
                type: array
                items:
                  $ref: '#/components/schemas/email'
                description: Comma separated list of User Emails
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/UserResponseFull'
                required:
                  - data
    post:
      tags:
        - Users
      operationId: Users_create
      summary: Create a user
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/UserResponseSimple'
                required:
                  - data
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  properties:
                    attributes:
                      $ref: '#/components/schemas/UserRequest'
                  required:
                    - attributes
              required:
                - data
  /api/v1/users/{id}:
    get:
      tags:
        - Users
      operationId: Users_read
      summary: Fetch a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/uuid'
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/UserResponseFull'
                required:
                  - data
    patch:
      tags:
        - Users
      operationId: Users_update
      summary: Update a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/uuid'
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/UserResponseSimple'
                required:
                  - data
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRequestUpdate'
