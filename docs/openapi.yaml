openapi: 3.1.0
info:
  title: Xpand API
  version: 2025-03
tags:
  - name: Users
  - name: Journeys
  - name: User Journeys
  - name: Custom Fields
  - name: References
  - name: Offers (Deprecated)
paths:
  /api/v1/job_profiles:
    get:
      operationId: References_job_profiles
      summary: Fetch Job Profiles
      description: Fetch a Job Profile
      parameters: []
      responses:
        '204':
          description: 'There is no content to send for this request, but the headers may be useful. '
      tags:
        - References
  /api/v1/offer_letters:
    get:
      operationId: Offers_list
      summary: Search Offer Letters
      description: Search Offer Letters - Offer Letters are the letters that are sent to candidates.
      parameters:
        - name: filters
          in: query
          required: false
          schema:
            type: object
            properties:
              ids:
                type: string
                description: Comma separated list of Xpand Offer IDs
                examples:
                  - 64891c74d5ee1bb16dfdafd8,64891e2ad5ee1bb16dfdafd9
              offer_ids:
                type: string
                description: Comma separated list of Client Offer IDs
                examples:
                  - 64891c74d5ee1bb16dfdafd8,64891e2ad5ee1bb16dfdafd9
              user_ids:
                type: string
                description: Comma separated list of Xpand User IDs
                examples:
                  - 64891c74d5ee1bb16dfdafd8,64891e2ad5ee1bb16dfdafd9
              statuses:
                type: array
                items:
                  type: string
                  enum:
                    - pending_initiation
                    - pending_approval
                    - admin_approved
                    - admin_rejected
                    - candidate_pending
                    - candidate_accepted
                    - candidate_declined
                    - rescinded
                    - voided
                description: Comma separated list of Offer Statuses
          explode: false
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
          explode: false
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Responses.OfferLetterList'
                required:
                  - data
      tags:
        - Offers (Deprecated)
      deprecated: true
    post:
      operationId: Offers_create
      summary: Create/Update Offer Letter
      description: Create/Update Offer Letter - Create or update an offer letter.
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Responses.OfferLetterCreate'
                required:
                  - data
      tags:
        - Offers (Deprecated)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  properties:
                    attributes:
                      $ref: '#/components/schemas/Requests.OfferLetterUpsert'
                  required:
                    - attributes
              required:
                - data
      deprecated: true
  /api/v1/offer_letters/{id}:
    delete:
      operationId: Offers_delete
      summary: Rescind Offer Letter
      description: Rescind an offer letter.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/UUID'
      responses:
        '204':
          description: 'There is no content to send for this request, but the headers may be useful. '
      tags:
        - Offers (Deprecated)
      deprecated: true
  /api/v1/office_locations:
    get:
      operationId: References_office_locations
      summary: Fetch Office Locations
      description: Fetch Office Locations
      parameters: []
      responses:
        '204':
          description: 'There is no content to send for this request, but the headers may be useful. '
      tags:
        - References
  /api/v1/users:
    get:
      operationId: Users_list
      summary: Search Users
      description: Search Users - Users are the people who are part of the Xpand system.
      parameters:
        - name: filter
          in: query
          required: false
          schema:
            type: object
            properties:
              ids:
                type: string
                description: Comma separated list of Xpand User IDs
                examples:
                  - 64891c74d5ee1bb16dfdafd8,64891e2ad5ee1bb16dfdafd9
              emails:
                type: string
                description: Comma separated list of User Emails
                examples:
                  - john@example.com,jane@example.com
          explode: false
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
          explode: false
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Responses.UserList'
                required:
                  - data
      tags:
        - Users
    post:
      operationId: Users_create
      summary: Create User
      description: Create a User
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Responses.UserCreate'
                required:
                  - data
      tags:
        - Users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  properties:
                    attributes:
                      $ref: '#/components/schemas/Requests.UserUpsert'
                  required:
                    - attributes
              required:
                - data
  /api/v1/users/{id}:
    get:
      operationId: Users_show
      summary: Fetch User
      description: Fetch a User
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/UUID'
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Responses.UserShow'
                required:
                  - data
      tags:
        - Users
    patch:
      operationId: Users_update
      summary: Update User
      description: Update a User
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/UUID'
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Responses.UserUpdate'
                required:
                  - data
      tags:
        - Users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  properties:
                    attributes:
                      $ref: '#/components/schemas/Requests.UserUpsertUpdate'
  /api/v2/custom_fields:
    get:
      operationId: CustomFields_list
      summary: Search Custom Fields
      description: Lists custom fields that can be used in user journeys or forms. Custom fields help capture metadata unique to your organization.
      parameters:
        - name: filters
          in: query
          required: false
          schema:
            type: object
            properties:
              id:
                type: string
                description: Comma separated list of Custom Field IDs
                examples:
                  - 1234,123456
              transition_type:
                type: string
                description: Comma separated list of Transition Types
                examples:
                  - pre_offer, offer, post_offer, onboarding, offboarding
              data_type:
                type: string
                description: Comma separated list of Data Types
                examples:
                  - string, integer, big_decimal, array, hash, time, date, boolean
              active:
                type: string
                description: Comma separated list of Active
                examples:
                  - true, false
          explode: false
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
          explode: false
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
          explode: false
        - name: order_by
          in: query
          required: false
          schema:
            type: string
            default: created_at
          explode: false
        - name: direction
          in: query
          required: false
          schema:
            type: string
            default: asc
          explode: false
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Responses.CustomFieldList'
      tags:
        - Custom Fields
    post:
      operationId: CustomFields_create
      summary: Create Custom Field
      description: Creates a new custom field that can be used in user journeys or forms.
      parameters: []
      responses:
        '201':
          description: The request has succeeded and a new resource has been created as a result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Responses.CustomFieldCreate'
        '422':
          description: Client error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors.ValidationError'
      tags:
        - Custom Fields
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Requests.CustomFieldCreate'
  /api/v2/custom_fields/{id}:
    get:
      operationId: CustomFields_show
      summary: Fetch Custom Field
      description: Fetch a Custom Field
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/UUID'
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Responses.CustomFieldShow'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors.NotFoundError'
      tags:
        - Custom Fields
  /api/v2/custom_fields/{id}/activate:
    patch:
      operationId: CustomFields_activate
      summary: Activate Custom Field
      description: Activates a custom field.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/UUID'
      responses:
        '200':
          description: The request has succeeded.
      tags:
        - Custom Fields
  /api/v2/custom_fields/{id}/deactivate:
    patch:
      operationId: CustomFields_deactivate
      summary: Deactivate Custom Field
      description: Deactivates a custom field. This will not delete the custom field, but will make it inactive. Once deactivated it cannot be used in the Create User Journey API
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/UUID'
      responses:
        '200':
          description: The request has succeeded.
      tags:
        - Custom Fields
  /api/v2/journeys:
    get:
      operationId: Journeys_list
      summary: Search Journeys
      description: Search Journeys - Journeys are the templates that can be used to create user journeys.
      parameters:
        - name: filters
          in: query
          required: false
          schema:
            type: object
            properties:
              title:
                type: string
                description: Comma separated list of title
                examples:
                  - Offer, Next Offer
              transition_type:
                type: string
                description: Comma separated list of transition types
                examples:
                  - pre_offer, offer, post_offer, onboarding, offboarding
              published:
                type: boolean
                examples:
                  - true
          explode: false
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
          explode: false
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
          explode: false
        - name: order_by
          in: query
          required: false
          schema:
            type: string
            default: created_at
          explode: false
        - name: direction
          in: query
          required: false
          schema:
            type: string
            default: asc
          explode: false
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Responses.JourneyList'
      tags:
        - Journeys
  /api/v2/journeys/{id}:
    get:
      operationId: Journeys_show
      summary: Fetch Journey
      description: Fetch a Journey
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/UUID'
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Responses.JourneyShow'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors.NotFoundError'
      tags:
        - Journeys
  /api/v2/user_journeys:
    get:
      operationId: UserJourneys_list
      summary: Search User Journeys
      description: Search User Journeys - User Journeys are the journeys that are assigned to a user.
      parameters:
        - name: filters
          in: query
          required: false
          schema:
            type: object
            properties:
              user_id:
                type: string
                description: Comma separated list of User IDs
                examples:
                  - 64891c74d5ee1bb16dfdafd8,64891e2ad5ee1bb16dfdafd9
              journey_id:
                type: string
                description: Comma separated list of Journey IDs
                examples:
                  - 64891c74d5ee1bb16dfdafd8,64891e2ad5ee1bb16dfdafd9
              office_location_id:
                type: string
                description: Comma separated list of Office Location IDs
                examples:
                  - 64891c74d5ee1bb16dfdafd8,64891e2ad5ee1bb16dfdafd9
              transition_type:
                type: string
                description: Comma separated list of transition types
                examples:
                  - pre_offer, offer, post_offer, onboarding, offboarding
              state:
                type: string
                description: Comma separated list of states
                examples:
                  - draft, needs_attention, pending_approval, approved, rejected, rescinded, user_pending, submitted, declined, completed
              custom_fields:
                type: object
                properties:
                  key1:
                    type: string
                  key2:
                    type: string
          explode: false
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
          explode: false
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
          explode: false
        - name: order_by
          in: query
          required: false
          schema:
            type: string
            default: created_at
          explode: false
        - name: direction
          in: query
          required: false
          schema:
            type: string
            default: asc
          explode: false
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Responses.UserJourneyList'
      tags:
        - User Journeys
    post:
      operationId: UserJourneys_create
      summary: Create User Journey
      description: Create a User Journey
      parameters: []
      responses:
        '201':
          description: The request has succeeded and a new resource has been created as a result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Responses.UserJourneyCreate'
        '422':
          description: Client error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors.ValidationError'
      tags:
        - User Journeys
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Requests.UserJourneyCreate'
  /api/v2/user_journeys/rescind:
    patch:
      operationId: UserJourneys_rescindMultiple
      summary: Rescind Multiple User Journeys
      description: Rescind all rescindable journeys for a user, optionally filtered by transition type. transition_type accepts a comma-separated list and spaces after commas are allowed.
      parameters: []
      responses:
        '204':
          description: 'There is no content to send for this request, but the headers may be useful. '
        '401':
          description: Access is unauthorized.
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors.NotFoundError'
        '422':
          description: Client error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors.ValidationError'
      tags:
        - User Journeys
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Requests.UserJourneyRescindMultiple'
  /api/v2/user_journeys/{id}:
    get:
      operationId: UserJourneys_show
      summary: Fetch User Journey
      description: Fetch a User Journey
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/UUID'
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Responses.UserJourneyShow'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors.NotFoundError'
      tags:
        - User Journeys
    patch:
      operationId: UserJourneys_update
      summary: Update User Journey
      description: Update a User Journey
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/UUID'
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Responses.UserJourneyUpdate'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors.NotFoundError'
        '422':
          description: Client error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors.ValidationError'
      tags:
        - User Journeys
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Requests.UserJourneyUpdate'
  /api/v2/user_journeys/{id}/rescind:
    patch:
      operationId: UserJourneys_rescind
      summary: Rescind Single User Journey
      description: Rescind a single user journey by ID. This operation uses rescind_reason only.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/UUID'
      responses:
        '204':
          description: 'There is no content to send for this request, but the headers may be useful. '
        '401':
          description: Access is unauthorized.
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors.NotFoundError'
        '422':
          description: Client error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors.ValidationError'
      tags:
        - User Journeys
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Requests.UserJourneyRescind'
  /api/v2/user_journeys/{id}/tasks:
    get:
      operationId: UserJourneys_tasks
      summary: Fetch Tasks for a User Journey
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: array
                items:
                  anyOf:
                    - $ref: '#/components/schemas/UserJourneys.TextTask'
                    - $ref: '#/components/schemas/UserJourneys.DocumentTask'
                    - $ref: '#/components/schemas/UserJourneys.VideoTask'
                    - $ref: '#/components/schemas/UserJourneys.I9Task'
                    - $ref: '#/components/schemas/UserJourneys.EmbeddedUrlTask'
                    - $ref: '#/components/schemas/UserJourneys.PowerPointTask'
                    - $ref: '#/components/schemas/UserJourneys.FormBuilderTask'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors.NotFoundError'
      tags:
        - User Journeys
security:
  - BearerAuth: []
components:
  schemas:
    Base64:
      type: string
      format: Base64
      examples:
        - WW91J3JlIGEgY3VyaW91cyBmZWxsb3cgOy0p
    Date:
      type: string
      format: YYYY-MM-DD
      examples:
        - '2026-01-01'
    DateTime:
      type: string
      format: iso8601
      examples:
        - '2026-02-01T01:02:03Z'
    Email:
      type: string
      format: email
      examples:
        - testing@example.com
    Enums.JourneyPublishingState:
      type: string
      enum:
        - unpublished
        - published
        - draft
      examples:
        - published
    Enums.JourneyTransitionType:
      type: string
      enum:
        - pre_offer
        - offer
        - post_offer
        - onboarding
        - offboarding
      examples:
        - pre_offer
    Enums.UserJourneyRescindReason:
      type: string
      enum:
        - no_longer_needed
        - offered_externally
      examples:
        - no_longer_needed
    Enums.UserJourneyState:
      type: string
      enum:
        - draft
        - needs_attention
        - pending_approval
        - approved
        - rejected
        - rescinded
        - user_pending
        - submitted
        - declined
        - completed
      examples:
        - approved
    Errors.NotFoundError:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          enum:
            - NOT_FOUND
        message:
          type: string
    Errors.ValidationError:
      type: object
      required:
        - code
        - message
        - details
      properties:
        code:
          type: string
          enum:
            - VALIDATION_ERROR
        message:
          type: string
        details:
          type: array
          items:
            type: string
    Models.Address:
      type: object
      required:
        - city
        - country
      properties:
        line_1:
          type: string
          examples:
            - 31 St, 34 West
        line_2:
          type: string
          examples:
            - 8th Avenue
        line_3:
          type: string
        city:
          type: string
          examples:
            - New York
        state:
          type: string
          examples:
            - New York
        postal_code:
          type: string
          examples:
            - '100018'
        country:
          type: string
          examples:
            - USA
        current:
          type: boolean
          examples:
            - true
        permanent:
          type: boolean
          examples:
            - true
        start_date:
          $ref: '#/components/schemas/Date'
        end_date:
          $ref: '#/components/schemas/Date'
    Models.Attachment:
      type: object
      properties:
        file_name:
          type: string
          examples:
            - abc.pdf
        file_content_base64:
          $ref: '#/components/schemas/Base64'
        responses:
          type: object
          properties:
            field_name_1:
              type: string
              examples:
                - abc
            field_name_2:
              type: string
              examples:
                - cba
          description: Responses provided in PDF form fields (only present when attachment is a PDF with form fields)
    Models.Document:
      type: object
      properties:
        document_type:
          type: string
          examples:
            - offer_letter
        document_number:
          type: string
          examples:
            - '1234'
        document_title:
          type: string
          examples:
            - Offer Letter
        document_description:
          type: string
          examples:
            - Offer Letter to the Joe
        issuer:
          type: string
          examples:
            - Issuer
        issuer_city:
          type: string
          examples:
            - New York
        issuer_state:
          type: string
          examples:
            - New York
        issuer_country:
          type: string
          examples:
            - USA
        issued_date:
          $ref: '#/components/schemas/Date'
        expiry_date:
          $ref: '#/components/schemas/Date'
        attachments:
          type: array
          items:
            $ref: '#/components/schemas/Models.Attachment'
    Models.Education:
      type: object
      properties:
        school_name:
          type: string
          examples:
            - School Name
        degree:
          type: string
          examples:
            - Degree
        student_id:
          type: string
          examples:
            - '1001'
        time_type:
          type: string
          examples:
            - Full Time
        major:
          type: string
